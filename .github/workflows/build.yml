name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout this repo
      uses: actions/checkout@v4

    - name: Clone Element X Android
      run: |
        git clone --depth 1 --branch main https://github.com/element-hq/element-x-android element-x-android
        cd element-x-android

    - name: Apply IM rebrand patch
      run: |
        cd element-x-android
        sed -i 's/const val APPLICATION_ID = "io.element.android.x"/const val APPLICATION_ID = "space.aliterra.im"/' plugins/src/main/kotlin/config/BuildTimeConfig.kt
        sed -i 's/const val APPLICATION_NAME = "Element X"/const val APPLICATION_NAME = "IM"/' plugins/src/main/kotlin/config/BuildTimeConfig.kt
        grep -A2 "object BuildTimeConfig" plugins/src/main/kotlin/config/BuildTimeConfig.kt

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x element-x-android/gradlew

    - name: Build with Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper
        build-root-directory: element-x-android

    - name: Assemble debug APK
      run: |
        cd element-x-android
        ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build.log || (tail -200 build.log && exit 1)

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: element-x-android/app/build/outputs/apk/debug/app-debug.apk
        
    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: element-x-android/build.log
