name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout this repo
      uses: actions/checkout@v4

    - name: Clone Element X Android
      run: |
        git clone --depth 1 --branch main https://github.com/element-hq/element-x-android element-x-android
        cd element-x-android

    - name: Apply IM rebrand patch
      run: |
        cd element-x-android
        sed -i 's/const val APPLICATION_ID = "io.element.android.x"/const val APPLICATION_ID = "space.aliterra.im"/' plugins/src/main/kotlin/config/BuildTimeConfig.kt
        sed -i 's/const val APPLICATION_NAME = "Element X"/const val APPLICATION_NAME = "IM"/' plugins/src/main/kotlin/config/BuildTimeConfig.kt
        grep -A2 "object BuildTimeConfig" plugins/src/main/kotlin/config/BuildTimeConfig.kt

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build debug APK
      run: |
        cd element-x-android
        export JAVA_OPTS="-Xmx4g"
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: element-x-android/app/build/outputs/apk/debug/app-debug.apk
