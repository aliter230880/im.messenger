name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout this repo
      uses: actions/checkout@v4

    - name: Clone Element X Android
      run: |
        git clone --depth 1 --branch release/26.06.1 https://github.com/element-hq/element-x-android element-x-android
        cd element-x-android

    - name: Apply IM rebrand patch
      run: |
        cd element-x-android
        sed -i 's/const val APPLICATION_ID = "io.element.android.x"/const val APPLICATION_ID = "space.aliterra.im"/' plugins/src/main/kotlin/config/BuildTimeConfig.kt
        sed -i 's/const val APPLICATION_NAME = "Element X"/const val APPLICATION_NAME = "IM"/' plugins/src/main/kotlin/config/BuildTimeConfig.kt
        grep -A2 "object BuildTimeConfig" plugins/src/main/kotlin/config/BuildTimeConfig.kt

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x element-x-android/gradlew

    - name: Downgrade Gradle to stable 8.11.1
      run: |
        cd element-x-android
        sed -i 's|gradle-9.2.1-bin.zip|gradle-8.11.1-bin.zip|' gradle/wrapper/gradle-wrapper.properties
        sed -i 's|distributionSha256Sum=.*|distributionSha256Sum=daea786a4f3c3963d2f71b46a651f7a94497252b97ccbcafe37d03aba48a3fd2|' gradle/wrapper/gradle-wrapper.properties
        grep "distributionUrl" gradle/wrapper/gradle-wrapper.properties

    - name: Assemble debug APK
      working-directory: element-x-android
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log || (tail -500 build.log && exit 1)
        echo "==> APK files:"
        find app/build/outputs/apk -name "*.apk" -ls

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: element-x-android/app/build/outputs/apk/debug/*.apk
        
    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: element-x-android/build.log
